services:
  - type: web
    name: divya-app
    runtime: node
    rootDir: .
    plan: starter
    autoDeploy: false
    buildCommand: cd backend && npm ci && cd ../web && npm ci && npm run build
    startCommand: cd web && npm run start
    healthCheckPath: /health/live
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_BACKEND_ORIGIN
        sync: false
      - key: BACKEND_API_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: ADMIN_DASHBOARD_URL
        sync: false
      - key: DISABLE_PAYMENTS
        value: "true"
      - key: ENABLE_SIMULATOR_API
        value: "false"
      - key: ENABLE_OBSERVABILITY_INGEST
        value: "true"
      - key: TRUST_PROXY
        value: "true"
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: GOOGLE_ANDROID_WEB_CLIENT_ID
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@divya.app
      - key: FROM_NAME
        value: Divya - Sacred Prayer App
      - key: ADMIN_BOOKING_ALERT_EMAILS
        value: avinashsreekumar007@gmail.com
      - key: CONTACT_ALERT_EMAILS
        value: avinashsreekumar007@gmail.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MIXPANEL_TOKEN
        sync: false
